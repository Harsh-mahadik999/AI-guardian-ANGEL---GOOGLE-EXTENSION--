<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guardian AI Shield</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <noscript>
    <p style="color:red;">This extension requires JavaScript to work.</p>
  </noscript>

  <!-- Setup Screen -->
  <div id="setup-screen">
    <div class="setup-icon">🛡️</div>
    <h2>Guardian AI</h2>
    <p class="desc">
      Enter your Google Gemini API Key to enable AI features
    </p>

    <input id="setup-key" type="password"
      placeholder="AIzaSy..."
      aria-label="Gemini API Key"
      autocomplete="off" />

    <button type="button" id="setup-save">Activate</button>
    <button type="button" id="setup-skip" class="secondary">Skip</button>
  </div>

  <!-- Main App -->
  <div id="main-app" class="hidden">

    <header>
      <h3>🛡️ Guardian AI</h3>
      <button id="toggle-theme" type="button">🌙</button>
    </header>

    <!-- Tabs -->
    <nav>
      <button class="tab active" data-tab="dashboard" type="button">Dashboard</button>
      <button class="tab" data-tab="scanner" type="button">Scanner</button>
      <button class="tab" data-tab="settings" type="button">Settings</button>
    </nav>

    <!-- Dashboard -->
    <section id="dashboard" class="panel active">
      <div class="card">
        <h4>Safety Status</h4>
        <p id="status">Ready</p>
      </div>
    </section>

    <!-- Scanner -->
    <section id="scanner" class="panel">
      <h4>Scanner</h4>

      <button id="scan-btn" type="button">🔍 Scan Page</button>

      <div id="loader" class="hidden">⏳ Scanning...</div>
      <div id="result">No scan yet</div>
      <div id="error" class="error hidden"></div>
    </section>

    <!-- Settings -->
    <section id="settings" class="panel">
      <h4>Settings</h4>

      <input id="settings-key" type="password"
        placeholder="Gemini API Key"
        aria-label="Gemini API Key"
        autocomplete="off">

      <button id="save-key" type="button">Save</button>
      <button id="clear-key" type="button" class="danger">Reset</button>
    </section>

  </div>

  <script src="popup.js"></script>
</body>
</html>
